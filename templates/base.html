<!DOCTYPE html>
<html>
<head>
    <title>Scrap Tracker</title>
</head>
<body>

    <h1>Scrap Tracker</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}
    {% endblock %}

</body>
</html>
