<!DOCTYPE html>
<html>
<head>
    <title>Scrap Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            background: #f4f6f9;
            font-family: Arial, sans-serif;
            color: #0f172a;
        }

        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #07111f, #06101d);
            color: white;
            padding: 24px 18px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
        }

        .brand {
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 35px;
            letter-spacing: .5px;
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #dce8f5;
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .nav-link-custom:hover,
        .nav-link-custom.active {
            background: #12345a;
            color: #5cc8ff;
        }

        .sidebar-bottom {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 22px;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 14px;
            padding: 16px;
            font-size: 14px;
            background: rgba(255,255,255,.04);
        }

        .main-area {
            margin-left: 260px;
            width: calc(100% - 260px);
        }

        .topbar {
            height: 70px;
            background: #06101d;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 40px;
            padding: 0 28px;
            font-weight: 600;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #37c95f;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .page-content {
            padding: 28px;
        }

        .card {
            border-radius: 16px !important;
        }

        @media(max-width: 900px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .app-shell {
                display: block;
            }

            .main-area {
                margin-left: 0;
                width: 100%;
            }

            .sidebar-bottom {
                position: relative;
                left: auto;
                right: auto;
                bottom: auto;
                margin-top: 20px;
            }
        }
    </style>
</head>

<body>

<div class="app-shell">

    <aside class="sidebar">

        <div class="brand">
            🗑 SCRAP TRACKER
        </div>

        <a href="/dashboard" class="nav-link-custom active">🏠 Dashboard</a>
        <a href="/add-scrap" class="nav-link-custom">📄 New Report</a>
        <a href="/reports" class="nav-link-custom">📋 Reports</a>
        <a href="/users" class="nav-link-custom">👥 Users</a>
        <a href="/export-excel" class="nav-link-custom">⬇ Export</a>

        <div class="sidebar-bottom">
            <div class="text-muted">Today's Date</div>
            <div class="fw-bold mb-3">{{ now_date if now_date else "" }}</div>

            <div class="text-muted">Shift</div>
            <span class="badge bg-primary mt-1">Day Shift</span>
        </div>

    </aside>

    <main class="main-area">

        <div class="topbar">
            <div>
                <span class="live-dot"></span>Live
            </div>

            <div>
                Last updated: <span id="topbarClock"></span>
            </div>

            <div>
                👤 {{ current_user.username if current_user.is_authenticated else "User" }}
            </div>
        </div>

        <div class="page-content">
            {% block content %}{% endblock %}
        </div>

    </main>

</div>

<script>
function updateTopbarClock(){
    const now = new Date();
    const clock = document.getElementById("topbarClock");
    if(clock){
        clock.innerHTML = now.toLocaleTimeString();
    }
}
updateTopbarClock();
setInterval(updateTopbarClock, 1000);
</script>

</body>
</html>
