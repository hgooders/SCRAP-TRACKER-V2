{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card p-4">

            <h2 class="mb-4 text-center">
                Login
            </h2>

            <form method="POST">

                <input
                    type="text"
                    name="username"
                    class="form-control mb-3"
                    placeholder="Username"
                    required
                >

                <input
                    type="password"
                    name="password"
                    class="form-control mb-3"
                    placeholder="Password"
                    required
                >

                <button class="btn btn-danger w-100">
                    Login
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
