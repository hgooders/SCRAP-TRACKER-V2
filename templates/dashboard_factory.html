<div class="card shadow-lg border-0 rounded-4 mb-4">

    <div class="card-header bg-white">

        <div class="row align-items-center">

            <!-- LEFT STATUS PANEL -->

            <div class="col-lg-3">

                <h4 class="fw-bold mb-3">
                    Production Line Status
                </h4>

                <div class="factory-status-list">

                    {% for line in line_statuses %}

                    <div class="status-row">

                        <div class="status-left">

                            <span class="status-light {{ line.colour }}"></span>

                            <span class="status-name">

                                {{ line.name }}

                            </span>

                        </div>

                        <div class="status-count">

                            {{ line.count }}

                        </div>

                    </div>

                    {% endfor %}

                </div>

            </div>

            <!-- FACTORY -->

            <div class="col-lg-9">

                <div class="factory-map">

                    <!-- Background -->

                    <img
                        src="{{ url_for('static', filename='images/factory-layout.png') }}"
                        class="factory-image">

                    <!-- Production Lines -->

                    <div class="factory-overlay">

                        <!-- ENGINE -->

                        <div class="production-bar engine green">

                            ENGINE LINE

                        </div>

                        <!-- CHASSIS 1 -->

                        <div class="production-bar chassis1 amber">

                            CHASSIS 1

                        </div>

                        <!-- CHASSIS 2 -->

                        <div class="production-bar chassis2 green">

                            CHASSIS 2

                        </div>

                        <!-- CHASSIS 3 -->

                        <div class="production-bar chassis3 green">

                            CHASSIS 3

                        </div>

                        <!-- IP -->

                        <div class="production-bar ip green">

                            IP LINE

                        </div>

                        <!-- OTHER -->

                        <div class="production-bar other green">

                            OTHER PROCESS

                        </div>

                        <!-- TRIM 2 -->

                        <div class="production-bar trim2 green">

                            TRIM 2

                        </div>

                        <!-- DOOR -->

                        <div class="production-bar door green">

                            DOOR LINE

                        </div>

                        <!-- TRIM 1 -->

                        <div class="production-bar trim1 green">

                            TRIM 1

                        </div>

                        <!-- FINAL 2 -->

                        <div class="production-bar final2 green">

                            FINAL 2

                        </div>

                        <!-- FINAL 1 -->

                        <div class="production-bar final1 red">

                            FINAL 1

                        </div>

                        <!-- QA -->

                        <div class="production-bar qa green">

                            QA

                        </div>

                        <!-- SSA -->

                        <div class="production-bar ssa green">

                            SSA

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<style>

.factory-map{

    position:relative;

    width:100%;

    height:620px;

    border-radius:18px;

    overflow:hidden;

    background:#dfe5ea;

    box-shadow:inset 0 0 30px rgba(0,0,0,.25);

}

.factory-image{

    position:absolute;

    width:100%;

    height:100%;

    object-fit:cover;

    left:0;

    top:0;

}

.factory-overlay{

    position:absolute;

    inset:0;

}

.factory-status-list{

    display:flex;

    flex-direction:column;

    gap:14px;

}

.status-row{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:14px 18px;

    background:white;

    border-radius:14px;

    box-shadow:0 2px 8px rgba(0,0,0,.08);

}

.status-left{

    display:flex;

    align-items:center;

    gap:12px;

}

.status-light{

    width:18px;

    height:18px;

    border-radius:50%;

}

.status-light.green{

    background:#2ecc71;

}

.status-light.amber{

    background:#f1c40f;

}

.status-light.red{

    background:#e74c3c;

}

.status-count{

    background:#f4f4f4;

    border-radius:999px;

    padding:4px 14px;

    font-weight:700;

}

.production-bar{

    position:absolute;

    height:56px;

    border-radius:8px;

    color:white;

    font-weight:800;

    display:flex;

    align-items:center;

    justify-content:center;

    border:2px solid rgba(255,255,255,.45);

    text-transform:uppercase;

    letter-spacing:.5px;

}

.production-bar.green{

    background:#4CAF50;

}

.production-bar.amber{

    background:#D4A017;

}

.production-bar.red{

    background:#C0392B;

}

.engine{

    left:28%;

    top:8%;

    width:24%;

}

.chassis1{

    left:33%;

    top:32%;

    width:23%;

}

.chassis2{

    left:56%;

    top:32%;

    width:23%;

}

.final1{

    left:33%;

    top:63%;

    width:23%;

}

.final2{

    left:56%;

    top:63%;

    width:23%;

}

</style>
