<div class="col-xl-9">

    <div class="card shadow-sm border-0 rounded-4">

        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <div>

                    <h4 class="fw-bold mb-1">
                        Factory Overview
                    </h4>

                    <small class="text-muted">
                        Live Production Status
                    </small>

                </div>

                <span class="badge bg-success px-3 py-2">
                    LIVE
                </span>

            </div>

            <div class="factory-map">

                <div class="factory-main"></div>

                <div class="factory-side"></div>

                <div class="factory-road horizontal"></div>

                <div class="factory-road vertical"></div>

                {% for line in line_statuses %}

                <div class="factory-line {{ line.colour }} {{ line.name|lower|replace(' ','-')|replace('/','-') }}">

                    <span>{{ line.name }}</span>

                    <strong>{{ line.count }}</strong>

                </div>

                {% endfor %}

            </div>

        </div>

    </div>

</div>
